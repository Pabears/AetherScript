description = "【舰队版】三测试团队并行出击 → 五巨头投票放行 → test/"
prompt = """
# 🧪 AetherScript 舰队版 — aesc-test 测试生成指令

你现在进入「测试舰队」模式。三个测试团队将从不同维度对生成的代码发起全面攻击，然后五巨头投票决定是否放行。

---

## 测试流程（严格按顺序执行）

### 【第零步：扫描待测目标】

扫描 `src/generated/` 目录，找到所有生成的实现文件。对每个文件报告：
- 实现类名、文件路径
- 对应的 Abstract Class（从 JSDoc 中找到原始约定）
- 方法列表及其测试难点

格式：
```
🔬 测试目标：
- [ClassName]Impl @ src/generated/[name].impl.ts
  对应抽象类：src/service/[name]-service.ts
  高风险方法：[method1]（原因：[why]）, ...
```

---

### 【第一步：三团队并行测试设计】

针对每个实现类，三个测试团队同时给出测试方案：

---

#### 🔍 QA黑客团队（质量测试）
**职责：** 功能完整性、业务逻辑正确性、边界条件  
**测试策略：**
- Happy path：所有正常流程都要跑通
- 边界值分析：空字符串、0、负数、最大值、最小值
- 等价类划分：每个有效/无效输入类别都有代表性测试
- 状态转换：多次调用之间的状态一致性

**测试文件标注：**
```typescript
// [QA黑客] 质量测试套件
describe('[ClassName] - QA黑客攻击', () => { ... })
```

---

#### 🔒 安全死心眼团队（安全测试）
**职责：** 安全漏洞、注入攻击、权限绕过、敏感数据泄露  
**测试策略：**
- 输入注入：SQL注入字符串、XSS payload、路径遍历
- 权限边界：越权访问、未授权操作
- 数据泄露：确保敏感字段不出现在响应中
- 异常信息：错误消息不泄露系统内部信息

**测试文件标注：**
```typescript
// [安全死心眼] 安全渗透测试套件
describe('[ClassName] - 安全死心眼攻击', () => { ... })
```

---

#### 👑 架构暴君团队（性能 & 架构测试）
**职责：** 性能边界、并发处理、内存泄漏、依赖注入正确性  
**测试策略：**
- 并发测试：同时发起多个请求，验证无竞态条件
- 压力测试（Mock模拟）：大量数据输入的性能
- 依赖验证：所有 @AutoGen 依赖正确注入和使用
- 接口契约：实现完整履行了 Abstract Class 的契约

**测试文件标注：**
```typescript
// [架构暴君] 架构契约 & 性能测试套件
describe('[ClassName] - 架构暴君审计', () => { ... })
```

---

### 【第二步：五巨头投票放行大会】

三个测试方案展示后，五巨头进行放行投票：

```
# 🗳️ 五巨头放行投票大会

## 测试覆盖率审查

| 测试维度 | QA黑客 | 安全死心眼 | 架构暴君 |
|---------|--------|-----------|---------|
| 用例数量 | [N]    | [N]       | [N]     |
| 覆盖方法 | [X/Y]  | [X/Y]     | [X/Y]   |
| 风险覆盖 | [评估] | [评估]    | [评估]  |

---

## 五巨头逐一表态

**🤪 PM 🗳️：** [支持放行/要求补充] — 理由：[用户价值视角]

**👑 arch 🗳️：** [支持放行/要求补充] — 理由：[架构契约视角]

**🔍 qa 🗳️：** [支持放行/要求补充] — 理由：[质量覆盖视角]

**🔒 sec 🗳️：** [支持放行/要求补充] — 理由：[安全风险视角]

**💰 budget 🗳️：** [支持放行/要求补充] — 理由：[测试成本视角]

---

## 🏆 最终裁决

**投票结果：** [X/5 票支持放行]

[如果 ≥4票] ✅ **放行！** 合并三套测试，输出最终测试文件。
[如果 <4票] ❌ **打回！** 以下问题必须修复后重新审判：
  - [具体问题1]
  - [具体问题2]
```

**放行条件：** 五巨头中至少 4/5 票支持，方可执行生成脚本。

---

### 【第三步：执行测试生成脚本】

五巨头放行后，执行：

```
Run: bun ${extensionPath}/scripts/test.ts
```

脚本会将三套测试合并优化后写入 `test/` 目录。

---

### 【第四步：测试报告】

```
# ✅ 舰队测试生成完毕！

## 生成的测试文件：
[列出所有测试文件]

## 五巨头放行总结：
- 🤪 PM：[简评]
- 👑 arch：[简评]
- 🔍 qa：[简评]
- 🔒 sec：[简评]
- 💰 budget：[简评]

## 测试覆盖摘要：
- 质量测试用例：[N] 个
- 安全测试用例：[N] 个
- 架构测试用例：[N] 个
- 总计：[N] 个测试用例

## 运行测试：
bun test
（或项目配置的测试命令）
```

---

## ⚠️ 注意事项
- 测试必须基于 Mock，不能依赖真实数据库或外部服务
- 安全测试的 payload 必须真实，不能只是「检查一下输入」
- 架构暴君团队必须测试依赖注入容器的正确性
- 五巨头投票时必须有实质理由，不能纯粹走过场
- 如果发现 `src/generated/` 中有严重 bug，应告知用户先修复代码再重跑测试
"""
