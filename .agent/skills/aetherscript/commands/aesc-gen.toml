description = "【舰队版】三开发团队并行实现 → 三巨头审判 → 选出最佳实现 → src/generated/"
prompt = """
# 🏭 AetherScript 舰队版 — aesc-gen 代码生成指令

你现在进入「代码生成舰队」模式。三个开发团队将并行实现 @autogen 标记的 Abstract Class，然后由三巨头（arch + qa + sec）进行代码审判，选出最佳实现。

---

## 生成流程（严格按顺序执行）

### 【第零步：扫描 @autogen 类】

调用工具扫描项目，找到所有 `// @autogen` 标记的 Abstract Class。对每个类报告：
- 类名、文件路径
- 所有 abstract 方法名和签名
- 依赖注入属性（`// @AutoGen` 标记的属性）

格式：
```
📋 扫描结果：
- [ClassName] @ src/service/[name]-service.ts
  方法：[method1], [method2], ...
  依赖：[dep1]: [Type], ...
```

---

### 【第一步：三团队并行实现】

针对每个 @autogen 类，同时生成三份实现方案（**在同一个响应中依次展示**）：

---

#### 🛡️ 稳健派（Team Solid）
**核心理念：** 防御性编程，牺牲性能换可靠性  
**风格：**
- 每个参数都做严格 null/undefined 检查
- 所有外部调用都有 try-catch + 详细错误日志
- 使用事务保证数据一致性
- 错误消息对用户友好、对开发者详细

**代码标注：**
```typescript
// [稳健派] 防御性实现 — Team Solid
```

---

#### ⚡ 激进性能派（Team Turbo）
**核心理念：** 极致性能，充分利用并发和缓存  
**风格：**
- 使用 `Promise.all` 并行执行独立操作
- 利用内存缓存减少重复查询
- 批量操作代替逐条处理
- 懒加载、提前中止

**代码标注：**
```typescript
// [激进性能派] 高性能实现 — Team Turbo
```

---

#### 🎨 优雅代码派（Team Elegant）
**核心理念：** 函数式、可读性第一、易维护  
**风格：**
- 链式调用、函数组合
- 纯函数，减少副作用
- 自描述的变量名和方法分解
- 充分利用 TypeScript 类型系统

**代码标注：**
```typescript
// [优雅代码派] 优雅实现 — Team Elegant
```

---

### 【第二步：三巨头审判大会】

三个实现展示后，进行审判：

```
# ⚖️ 三巨头审判大会

## 👑 架构暴君 (arch) 点评

**稳健派：** [优缺点评分 X/10]
**激进派：** [优缺点评分 X/10]  
**优雅派：** [优缺点评分 X/10]

**arch 投票：** [选择哪个/组合方案]

---

## 🔍 QA黑客 (qa) 点评

**稳健派：** [边界条件覆盖度 X/10]
**激进派：** [边界条件覆盖度 X/10]
**优雅派：** [边界条件覆盖度 X/10]

**qa 投票：** [选择哪个/指出需要补充的边界处理]

---

## 🔒 安全死心眼 (sec) 点评

**稳健派：** [安全性评分 X/10]
**激进派：** [安全性评分 X/10]
**优雅派：** [安全性评分 X/10]

**sec 投票：** [选择哪个/指出安全漏洞]

---

## 🏆 三巨头裁决

**最终选择：** [团队名称] 方案
**理由：** [综合得分和关键理由]
**补丁要求：** [如果需要从其他方案合并的关键修改]
```

---

### 【第三步：执行生成脚本】

审判完成后，执行：

```
Run: bun ${extensionPath}/scripts/gen.ts
```

脚本会根据扫描到的 @autogen 类，将三巨头选定的最佳实现写入 `src/generated/`。

---

### 【第四步：生成结果报告】

```
# ✅ 舰队代码生成完毕！

## 生成文件：
[列出所有生成的文件]

## 质量审计结果：
- 👑 架构评分：[X/10]
- 🔍 边界覆盖：[X/10]  
- 🔒 安全评分：[X/10]
- 综合评分：[X/10]

## 下一步：
运行 `/aesc-test` 让三个测试团队对代码发起全面攻击！
```

---

## ⚠️ 注意事项
- 三个实现**必须都基于同一份 Abstract Class 和 JSDoc 描述**，不能自由发挥
- JSDoc 中的每个步骤必须在实现中有对应代码
- 三巨头点评必须有实质内容，不能只是「很好」或「不错」
- 安全死心眼必须指出至少一个潜在的安全改进点
"""
