<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>舰队指挥中心 · Fleet Commander</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="logo" id="home-link">
        <span class="logo-icon">🚀</span>
        <span class="logo-text">Fleet Commander</span>
        <span class="logo-sub">舰队指挥中心</span>
      </div>
      <button class="btn btn-primary" id="new-task-btn">
        <span>＋</span> 新建任务
      </button>
    </div>
  </header>

  <!-- ── Main Content ───────────────────────────────────── -->
  <main id="app">
    <!-- Task list view -->
    <section id="view-list" class="view">
      <div class="container">
        <div class="section-header">
          <h2>任务列表</h2>
          <span class="task-count" id="task-count">加载中…</span>
        </div>
        <div id="task-list" class="task-list">
          <div class="loading-spinner">⏳ 正在加载任务…</div>
        </div>
      </div>
    </section>

    <!-- Task detail view -->
    <section id="view-detail" class="view hidden">
      <div class="container">
        <button class="btn btn-ghost back-btn" id="back-btn">← 返回列表</button>
        <div id="task-detail-content"></div>
      </div>
    </section>
  </main>

  <!-- ── New Task Modal ─────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>🛠️ 新建舰队任务</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="new-task-form" class="modal-body">
        <div class="form-group">
          <label for="task-name">项目名称</label>
          <input
            id="task-name"
            type="text"
            placeholder="例：智能订单管理系统"
            required
            autocomplete="off"
          />
        </div>
        <div class="form-group">
          <label for="task-req">需求描述</label>
          <textarea
            id="task-req"
            rows="5"
            placeholder="描述你的项目需求，越详细越好…"
            required
          ></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="modal-cancel">取消</button>
          <button type="submit" class="btn btn-primary">🚀 创建任务</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
